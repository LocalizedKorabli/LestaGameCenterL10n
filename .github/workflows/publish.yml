name: Publish L10n Release to R2

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Download lgc_l10n.7z from Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ github.ref_name }}" \
            --pattern "lgc_l10n.7z" \
            --dir .

          if [ ! -f "lgc_l10n.7z" ]; then
            echo "::error::lgc_l10n.7z not found in release assets"
            exit 1
          fi

      - name: Upload to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp "lgc_l10n.7z" \
            "s3://${{ secrets.R2_BUCKET }}/lateral/lgc/lgc_l10n.7z" \
            --endpoint-url "${{ secrets.R2_ENDPOINT }}"

      - name: Trigger Cloudflare Pages Deploy Hook
        run: curl -X POST -s "${{ secrets.CF_PAGES_DEPLOY_HOOK }}"
